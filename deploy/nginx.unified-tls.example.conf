# Example: single public hostname — TLS termination, static SPA, and API reverse proxy.
# Replace APP_HOSTNAME and upstream names with your deployment values.
# After TLS, set backend ENFORCE_HTTPS=true (default in production) and ALLOWED_ORIGINS=https://APP_HOSTNAME

upstream branch_tracker_api {
  server 127.0.0.1:3001;
}

server {
  listen 443 ssl http2;
  server_name APP_HOSTNAME;

  # ssl_certificate     /etc/letsencrypt/live/APP_HOSTNAME/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/APP_HOSTNAME/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;

  location /api/ {
    proxy_pass         http://branch_tracker_api;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }

  location /health {
    proxy_pass         http://branch_tracker_api;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Forwarded-Proto https;
  }

  location / {
    try_files $uri /index.html;
  }
}
