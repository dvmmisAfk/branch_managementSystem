# Render Blueprint — backend API + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy: set ALLOWED_ORIGINS to your Vercel URL(s) in the Render dashboard.

databases:
  - name: branch-tracker-db
    plan: free
    databaseName: branch_tracker
    user: branch_tracker

services:
  - type: web
    name: branch-visit-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: branch-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: COOKIE_SAME_SITE
        value: none
      - key: ENFORCE_HTTPS
        value: "true"
      - key: API_DEBUG
        value: "false"
      # Set after Vercel deploy (exact production URL):
      # - key: ALLOWED_ORIGINS
      #   value: https://your-app.vercel.app
      # Optional: allow all Vercel preview deployments (HTTPS, credentials-safe suffix match):
      - key: ALLOWED_ORIGIN_SUFFIXES
        value: .vercel.app
