# Render Blueprint — backend API + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy: set ALLOWED_ORIGINS to your exact Vercel URL in the Render dashboard
# and remove or comment out ALLOWED_ORIGIN_SUFFIXES (see F-06 in SECURITY_AUDIT.md).

databases:
  - name: branch-tracker-db
    plan: free
    databaseName: branch_tracker
    user: branch_tracker

services:
  - type: web
    name: branch-visit-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: branch-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # F-02: VAULT_SECRET is the AES key-derivation secret for the SFH password vault.
      # Must differ from JWT_SECRET. Generate separately: openssl rand -base64 48
      # Set this manually in the Render dashboard — do NOT share it with JWT_SECRET.
      - key: VAULT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: COOKIE_SAME_SITE
        value: none
      - key: ENFORCE_HTTPS
        value: "true"
      - key: API_DEBUG
        value: "false"
      # F-06: Set ALLOWED_ORIGINS to the exact production Vercel URL after first deploy.
      # Avoid relying on ALLOWED_ORIGIN_SUFFIXES in production — any *.vercel.app can
      # make credentialed requests while the suffix is active. Remove it once the
      # production URL is known.
      # - key: ALLOWED_ORIGINS
      #   value: https://your-exact-app.vercel.app
      # Temporary — replace with exact origin above after first deploy:
      - key: ALLOWED_ORIGIN_SUFFIXES
        value: .vercel.app
      # F-05: Provide a Redis URL to enable persistent, distributed rate limiting.
      # Without this, rate-limit counters reset on every container restart.
      # - key: REDIS_URL
      #   value: redis://...
