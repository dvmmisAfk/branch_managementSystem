services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-branch_tracker}
    volumes:
      - pg_branch_tracker:/var/lib/postgresql/data
    # Do not publish 5432 on production hosts — keep DB on the Docker network only.
    # Uncomment for local debugging from the host:
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # F-07: All secrets must be supplied via a .env file — Compose will refuse to start
      # if any of these variables are unset. Copy .env.example to .env and generate real values:
      #   openssl rand -base64 48
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env (e.g. postgresql://postgres:PASSWORD@db:5432/branch_tracker?schema=public)}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env — generate with: openssl rand -base64 48}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env — generate with: openssl rand -base64 48}
      VAULT_SECRET: ${VAULT_SECRET:?VAULT_SECRET must be set in .env (must differ from JWT_SECRET) — generate with: openssl rand -base64 48}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      PORT: 3001
      NODE_ENV: production
      # Required when NODE_ENV=production (see backend/src/config/env.ts). Browser origins for the SPA.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      # Compose serves HTTP on localhost; disable HTTPS gate. Behind TLS termination, set ENFORCE_HTTPS=true and forward X-Forwarded-Proto.
      ENFORCE_HTTPS: "false"
      API_DEBUG: "false"
      # Optional: set REDIS_URL for persistent, distributed rate limiting across restarts.
      # REDIS_URL: ${REDIS_URL:-}
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001/api/v1
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pg_branch_tracker:
